<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026/03/24 洛阳拍摄照片集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            padding: 40px 25px;
            color: #fff;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 密码验证遮罩层 */
        .password-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .password-title {
            font-size: 24px;
            color: #fff;
            margin-bottom: 10px;
        }

        #password-input {
            padding: 12px 20px;
            font-size: 18px;
            width: 260px;
            text-align: center;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        #password-submit {
            padding: 12px 30px;
            font-size: 18px;
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        #password-submit:hover {
            background-color: #ddd;
        }

        .error-tip {
            color: #ff4444;
            font-size: 14px;
            height: 16px;
        }

        /* 相册内容默认隐藏 */
        .album-content {
            display: none;
        }

        /* 标题样式 */
        .title {
            text-align: center;
            color: #fff;
            font-size: 30px;
            margin-bottom: 45px;
            font-weight: 500;
            letter-spacing: 2px;
        }

        /* 照片容器：2张一行 */
        .photo-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 22px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 方形缩略图（自动截取人物面部） */
        .photo-item {
            width: 47%;
            aspect-ratio: 1 / 1;
            cursor: pointer;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.25s ease;
        }

        .photo-item:hover {
            transform: scale(1.03);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        /* 大图弹窗遮罩 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 999;
            text-align: center;
        }

        /* 关闭按钮 X */
        .close-btn {
            position: fixed;
            top: 25px;
            right: 35px;
            color: #fff;
            font-size: 42px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
            z-index: 1000;
        }

        .close-btn:hover {
            color: #bbb;
        }

        /* 大图（无白边框） */
        #enlarged-img {
            max-width: 92%;
            max-height: 92%;
            margin-top: 4%;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<!-- 密码验证层 -->
<div class="password-modal" id="pwdModal">
    <div class="password-title">请输入查看密码</div>
    <input type="password" id="password-input" placeholder="输入密码">
    <div class="error-tip" id="errorTip"></div>
    <button id="password-submit">确认进入</button>
</div>

<!-- 相册内容 -->
<div class="album-content" id="album">

        <div class="photo-item" data-img="1.jpg"><img src="1.jpg"></div>

    </div>

    <!-- 大图弹窗 -->
    <div class="modal-overlay" id="modal">
        <span class="close-btn" id="close-btn">&times;</span>
        <img id="enlarged-img" src="" alt="">
    </div>
</div>

<script>
    // ==================== 密码验证功能 ====================
    const correctPwd = "260324";
    const pwdModal = document.getElementById("pwdModal");
    const album = document.getElementById("album");
    const input = document.getElementById("password-input");
    const submit = document.getElementById("password-submit");
    const errorTip = document.getElementById("errorTip");

    // 验证密码
    function checkPassword() {
        if (input.value === correctPwd) {
            pwdModal.style.display = "none";
            album.style.display = "block";
        } else {
            errorTip.textContent = "密码错误，请重新输入！";
            input.value = "";
        }
    }

    // 点击按钮验证
    submit.addEventListener("click", checkPassword);
    // 回车验证
    input.addEventListener("keydown", e => {
        if (e.key === "Enter") checkPassword();
    });

    // ==================== 照片查看功能 ====================
    const grid = document.getElementById('photo-grid');
    const modal = document.getElementById('modal');
    const bigImg = document.getElementById('enlarged-img');
    const close = document.getElementById('close-btn');

    grid.addEventListener('click', e => {
        const item = e.target.closest('.photo-item');
        if(item) {
            bigImg.src = item.dataset.img;
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }
    });

    close.onclick = () => {
        modal.style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    modal.onclick = e => {
        if(e.target === modal) {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    }

    document.addEventListener('keydown', e => {
        if(e.key === 'Escape') {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    });
</script>
</body>
</html>
