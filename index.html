<html lang="zh-CN">
<head>

    <title>2026/03/24 洛阳摄影图集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            padding: 40px 25px;
            color: #fff;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 密码弹窗 */
        .password-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 0 20px;
        }

        .password-title {
            font-size: 24px;
            color: #fff;
            text-align: center;
        }

        #password-input {
            padding: 12px 20px;
            font-size: 18px;
            width: 260px;
            text-align: center;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        #password-submit {
            padding: 12px 30px;
            font-size: 18px;
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #password-submit:hover {
            background-color: #ddd;
        }

        .error-tip {
            color: #ff4444;
            font-size: 14px;
            height: 16px;
        }

        .album-content {
            display: none;
        }

        /* 标题 */
        .title {
            text-align: center;
            color: #fff;
            font-size: 30px;
            margin-bottom: 45px;
            font-weight: 500;
            letter-spacing: 2px;
        }

        /* 相册网格 */
        .photo-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 22px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .photo-item {
            width: 47%;
            aspect-ratio: 1/1;
            cursor: pointer;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.25s ease;
        }

        .photo-item:hover {
            transform: scale(1.03);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center; /* 面部优先：居中裁剪，优先保留核心区域 */
        }

        /* 大图弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.95);
            z-index: 999;
            text-align: center;
        }

        .close-btn {
            position: fixed;
            top: 25px;
            right: 35px;
            color: #fff;
            font-size: 42px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1001;
        }

        /* 左右切换箭头 */
        .nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            color: #fff;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            user-select: none;
        }

        .prev {
            left: 20px;
        }

        .next {
            right: 20px;
        }

        #enlarged-img {
            max-width: 92%;
            max-height: 92%;
            margin-top: 4%;
            border-radius: 6px;
            touch-action: none;
        }

        /* 手机适配 - 强制每行2张 */
        @media screen and (max-width: 768px) {
            body {
                padding: 30px 15px;
            }

            .title {
                font-size: 22px;
                letter-spacing: 1px;
                margin-bottom: 35px;
            }

            .photo-container {
                gap: 12px;
            }

            .photo-item {
                width: calc(50% - 6px); /* 精准控制每行2张，减去间距的一半 */
                border-radius: 8px;
            }

            .close-btn {
                top: 15px;
                right: 20px;
                font-size: 36px;
            }

            .nav-btn {
                width: 40px;
                height: 40px;
                font-size: 24px;
            }

            .prev {
                left: 10px;
            }

            .next {
                right: 10px;
            }

            #enlarged-img {
                max-width: 95%;
                max-height: 88%;
                margin-top: 6%;
            }
        }
    </style>
</head>

<script>
    // ========== 密码验证 + 24小时免登录 ==========
    const correctPwd = "260324";
    const pwdModal = document.getElementById("pwdModal");
    const album = document.getElementById("album");
    const input = document.getElementById("password-input");
    const submit = document.getElementById("password-submit");
    const errorTip = document.getElementById("errorTip");

    const STORAGE_KEY = "album_auth";
    const EXPIRE_TIME = 24 * 60 * 60 * 1000; // 24小时

    // 检查是否已授权
    function checkAuth() {
        const data = localStorage.getItem(STORAGE_KEY);
        if (!data) return false;
        try {
            const { time, pwd } = JSON.parse(data);
            return pwd === correctPwd && Date.now() - time < EXPIRE_TIME;
        } catch {
            return false;
        }
    }

    // 保存授权记录
    function saveAuth() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
            time: Date.now(),
            pwd: correctPwd
        }));
    }

    // 页面加载时自动判断
    if (checkAuth()) {
        pwdModal.style.display = "none";
        album.style.display = "block";
    }

    // 验证密码
    function checkPassword() {
        if (input.value === correctPwd) {
            saveAuth(); // 记住24小时
            pwdModal.style.display = "none";
            album.style.display = "block";
        } else {
            errorTip.textContent = "密码错误，请重新输入！";
            input.value = "";
        }
    }

    submit.addEventListener("click", checkPassword);
    input.addEventListener("keydown", e => {
        if (e.key === "Enter") checkPassword();
    });

    // ========== 照片切换逻辑 ==========
    const items = document.querySelectorAll(".photo-item");
    const modal = document.getElementById("modal");
    const bigImg = document.getElementById("enlarged-img");
    const closeBtn = document.getElementById("close-btn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    let currentIndex = 0;
    let total = items.length;

    // 打开对应图片（适配jsDelivr链接）
    function showImg(index) {
        currentIndex = index;
        bigImg.src = `https://cdn.jsdelivr.net/gh/way12go-cn/luoyang-photo@main/${index + 1}.jpg`;
    }

    // 点击缩略图打开
    items.forEach((el, i) => {
        el.addEventListener("click", () => {
            showImg(i);
            modal.style.display = "block";
            document.body.style.overflow = "hidden";
        });
    });

    // 关闭
    function closeModal() {
        modal.style.display = "none";
        document.body.style.overflow = "auto";
    }

    closeBtn.addEventListener("click", closeModal);
    modal.addEventListener("click", e => {
        if (e.target === modal) closeModal();
    });
    document.addEventListener("keydown", e => {
        if (e.key === "Escape") closeModal();
    });

    // 上一张 / 下一张
    function prev() {
        let idx = currentIndex - 1;
        if (idx < 0) idx = total - 1;
        showImg(idx);
    }

    function next() {
        let idx = currentIndex + 1;
        if (idx >= total) idx = 0;
        showImg(idx);
    }

    prevBtn.addEventListener("click", prev);
    nextBtn.addEventListener("click", next);

    // 手机左右滑动切换
    let startX = 0;
    bigImg.addEventListener("touchstart", e => {
        startX = e.touches[0].clientX;
    });

    bigImg.addEventListener("touchend", e => {
        let endX = e.changedTouches[0].clientX;
        let diff = startX - endX;
        if (Math.abs(diff) > 50) {
            diff > 0 ? next() : prev();
        }
    });

    // 电脑键盘左右键切换
    document.addEventListener("keydown", e => {
        if (modal.style.display === "block") {
            if (e.key === "ArrowLeft") prev();
            if (e.key === "ArrowRight") next();
        }
    });
</script>
