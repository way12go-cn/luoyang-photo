<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026/03/24 洛阳拍摄照片集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            padding: 40px 25px;
            color: #fff;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 密码弹窗 */
        .password-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 0 20px;
        }

        .password-title {
            font-size: 24px;
            color: #fff;
            text-align: center;
        }

        #password-input {
            padding: 12px 20px;
            font-size: 18px;
            width: 260px;
            text-align: center;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        #password-submit {
            padding: 12px 30px;
            font-size: 18px;
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #password-submit:hover {
            background-color: #ddd;
        }

        .error-tip {
            color: #ff4444;
            font-size: 14px;
            height: 16px;
        }

        .album-content {
            display: none;
        }

        /* 标题 */
        .title {
            text-align: center;
            color: #fff;
            font-size: 30px;
            margin-bottom: 45px;
            font-weight: 500;
            letter-spacing: 2px;
        }

        /* 相册网格 */
        .photo-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 22px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .photo-item {
            width: 47%;
            aspect-ratio: 1/1;
            cursor: pointer;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.25s ease;
        }

        .photo-item:hover {
            transform: scale(1.03);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        /* 大图弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.95);
            z-index: 999;
            text-align: center;
        }

        .close-btn {
            position: fixed;
            top: 25px;
            right: 35px;
            color: #fff;
            font-size: 42px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1001;
        }

        /* 左右切换箭头 */
        .nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            color: #fff;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            user-select: none;
        }

        .prev {
            left: 20px;
        }

        .next {
            right: 20px;
        }

        #enlarged-img {
            max-width: 92%;
            max-height: 92%;
            margin-top: 4%;
            border-radius: 6px;
            touch-action: none;
        }

        /* 手机适配 */
        @media screen and (max-width: 768px) {
            body {
                padding: 30px 15px;
            }

            .title {
                font-size: 22px;
                letter-spacing: 1px;
                margin-bottom: 35px;
            }

            .photo-container {
                gap: 12px;
            }

            .photo-item {
                width: calc(50% - 6px);
                border-radius: 8px;
            }

            .close-btn {
                top: 15px;
                right: 20px;
                font-size: 36px;
            }

            .nav-btn {
                width: 40px;
                height: 40px;
                font-size: 24px;
            }

            .prev {
                left: 10px;
            }

            .next {
                right: 10px;
            }

            #enlarged-img {
                max-width: 95%;
                max-height: 88%;
                margin-top: 6%;
            }
        }
    </style>
</head>

<body>
    <!-- 密码 -->
    <div class="password-modal" id="pwdModal">
        <div class="password-title">请输入查看密码</div>
        <input type="password" id="password-input" placeholder="输入密码">
        <div class="error-tip" id="errorTip"></div>
        <button id="password-submit">确认进入</button>
    </div>

    <!-- 相册 -->
    <div class="album-content" id="album">
        <div class="title">2026/03/24 洛阳拍摄照片集</div>

        <div class="photo-container" id="photo-grid">
            <div class="photo-item"><img src="1.jpg"></div>
            <div class="photo-item"><img src="2.jpg"></div>
            <div class="photo-item"><img src="3.jpg"></div>
            <div class="photo-item"><img src="4.jpg"></div>
            <div class="photo-item"><img src="5.jpg"></div>
            <div class="photo-item"><img src="6.jpg"></div>
            <div class="photo-item"><img src="7.jpg"></div>
            <div class="photo-item"><img src="8.jpg"></div>
            <div class="photo-item"><img src="9.jpg"></div>
            <div class="photo-item"><img src="10.jpg"></div>
            <div class="photo-item"><img src="11.jpg"></div>
            <div class="photo-item"><img src="12.jpg"></div>
            <div class="photo-item"><img src="13.jpg"></div>
            <div class="photo-item"><img src="14.jpg"></div>
            <div class="photo-item"><img src="15.jpg"></div>
            <div class="photo-item"><img src="16.jpg"></div>
            <div class="photo-item"><img src="17.jpg"></div>
            <div class="photo-item"><img src="18.jpg"></div>
            <div class="photo-item"><img src="19.jpg"></div>
            <div class="photo-item"><img src="20.jpg"></div>
            <div class="photo-item"><img src="21.jpg"></div>
            <div class="photo-item"><img src="22.jpg"></div>
            <div class="photo-item"><img src="23.jpg"></div>
            <div class="photo-item"><img src="24.jpg"></div>
            <div class="photo-item"><img src="25.jpg"></div>
            <div class="photo-item"><img src="26.jpg"></div>
            <div class="photo-item"><img src="27.jpg"></div>
            <div class="photo-item"><img src="28.jpg"></div>
            <div class="photo-item"><img src="29.jpg"></div>
            <div class="photo-item"><img src="30.jpg"></div>
            <div class="photo-item"><img src="31.jpg"></div>
            <div class="photo-item"><img src="32.jpg"></div>
            <div class="photo-item"><img src="33.jpg"></div>
            <div class="photo-item"><img src="34.jpg"></div>
            <div class="photo-item"><img src="35.jpg"></div>
            <div class="photo-item"><img src="36.jpg"></div>
            <div class="photo-item"><img src="37.jpg"></div>
            <div class="photo-item"><img src="38.jpg"></div>
            <div class="photo-item"><img src="39.jpg"></div>
            <div class="photo-item"><img src="40.jpg"></div>
            <div class="photo-item"><img src="41.jpg"></div>
            <div class="photo-item"><img src="42.jpg"></div>
            <div class="photo-item"><img src="43.jpg"></div>
        </div>

        <!-- 大图弹窗 -->
        <div class="modal-overlay" id="modal">
            <span class="close-btn" id="close-btn">&times;</span>
            <div class="nav-btn prev" id="prevBtn">‹</div>
            <div class="nav-btn next" id="nextBtn">›</div>
            <img id="enlarged-img" src="" alt="">
        </div>
    </div>

<script>
    // ========== 密码验证 ==========
    const correctPwd = "260324";
    const pwdModal = document.getElementById("pwdModal");
    const album = document.getElementById("album");
    const input = document.getElementById("password-input");
    const submit = document.getElementById("password-submit");
    const errorTip = document.getElementById("errorTip");

    function checkPassword() {
        if (input.value === correctPwd) {
            pwdModal.style.display = "none";
            album.style.display = "block";
        } else {
            errorTip.textContent = "密码错误，请重新输入！";
            input.value = "";
        }
    }

    submit.addEventListener("click", checkPassword);
    input.addEventListener("keydown", e => {
        if (e.key === "Enter") checkPassword();
    });

    // ========== 照片切换逻辑 ==========
    const items = document.querySelectorAll(".photo-item");
    const modal = document.getElementById("modal");
    const bigImg = document.getElementById("enlarged-img");
    const closeBtn = document.getElementById("close-btn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    let currentIndex = 0;
    let total = items.length;

    // 打开对应图片
    function showImg(index) {
        currentIndex = index;
        bigImg.src = (index + 1) + ".jpg";
    }

    // 点击缩略图打开
    items.forEach((el, i) => {
        el.addEventListener("click", () => {
            showImg(i);
            modal.style.display = "block";
            document.body.style.overflow = "hidden";
        });
    });

    // 关闭
    function closeModal() {
        modal.style.display = "none";
        document.body.style.overflow = "auto";
    }

    closeBtn.addEventListener("click", closeModal);
    modal.addEventListener("click", e => {
        if (e.target === modal) closeModal();
    });
    document.addEventListener("keydown", e => {
        if (e.key === "Escape") closeModal();
    });

    // 上一张 / 下一张
    function prev() {
        let idx = currentIndex - 1;
        if (idx < 0) idx = total - 1;
        showImg(idx);
    }

    function next() {
        let idx = currentIndex + 1;
        if (idx >= total) idx = 0;
        showImg(idx);
    }

    prevBtn.addEventListener("click", prev);
    nextBtn.addEventListener("click", next);

    // 手机左右滑动切换
    let startX = 0;
    bigImg.addEventListener("touchstart", e => {
        startX = e.touches[0].clientX;
    });

    bigImg.addEventListener("touchend", e => {
        let endX = e.changedTouches[0].clientX;
        let diff = startX - endX;
        if (Math.abs(diff) > 50) {
            diff > 0 ? next() : prev();
        }
    });

    // 电脑键盘左右键切换
    document.addEventListener("keydown", e => {
        if (modal.style.display === "block") {
            if (e.key === "ArrowLeft") prev();
            if (e.key === "ArrowRight") next();
        }
    });
</script>
</body>
</html>
